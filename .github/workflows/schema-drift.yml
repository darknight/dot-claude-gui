name: Claude schema drift

on:
  schedule:
    # 每周一 UTC 02:00 跑一次
    - cron: "0 2 * * 1"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install latest Claude Code
        run: |
          npm i -g @anthropic-ai/claude-code@latest
          CLI_PATH="$(npm root -g)/@anthropic-ai/claude-code/cli.js"
          if [ ! -f "$CLI_PATH" ]; then
            CLI_PATH="$(pnpm root -g)/@anthropic-ai/claude-code/cli.js"
          fi
          test -f "$CLI_PATH" || { echo "cli.js not found in npm/pnpm global"; exit 1; }
          echo "CLAUDE_CODE_CLI_JS=$CLI_PATH" >> "$GITHUB_ENV"

      - name: Check schema drift
        run: pnpm check:schema
