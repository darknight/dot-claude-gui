name: Claude schema drift

on:
  schedule:
    # 每周一 UTC 02:00 跑一次
    - cron: "0 2 * * 1"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install latest Claude Code
        run: |
          npm i -g @anthropic-ai/claude-code@latest
          echo "--- npm config ---"
          echo "prefix: $(npm prefix -g)"
          echo "root: $(npm root -g)"
          echo "--- locate package ---"
          PKG_DIR="$(npm ls -g @anthropic-ai/claude-code --parseable --depth=0 2>/dev/null | tail -n 1)"
          echo "npm ls parseable: $PKG_DIR"
          if [ -z "$PKG_DIR" ] || [ ! -d "$PKG_DIR" ]; then
            PKG_DIR="$(find / -maxdepth 8 -path '*/node_modules/@anthropic-ai/claude-code' -type d 2>/dev/null | head -n 1)"
            echo "find fallback: $PKG_DIR"
          fi
          CLI_PATH="$PKG_DIR/cli.js"
          test -f "$CLI_PATH" || { echo "cli.js not found"; exit 1; }
          echo "Resolved cli.js: $CLI_PATH"
          echo "CLAUDE_CODE_CLI_JS=$CLI_PATH" >> "$GITHUB_ENV"

      - name: Check schema drift
        run: pnpm check:schema
